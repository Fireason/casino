<!DOCTYPE html>
<html>
<head>
    <title>О нас</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        .highlighted-text{
        color: red
        background-color: #ffff00
        padding: 0 5px
        border-radius: 3px
        }


.container {
            max-width: 1400px;
            margin: 0 auto;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            border: 1;
            border-radius: 18px;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s ease;
            cursor: pointer;
        }
        h1 {
            color: black;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        button:hover {
            background-color: #0056b3;
        }
        <style>
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            width: 320px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .popup input, .popup select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .popup button {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 8px;
        }

        .close-btn {
            float: right;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>Страница "О нас"</h1>

    <button onclick="showFormPopup()">Оставить заявку</button>

    <div class="overlay" id="overlay"></div>
    <div class="popup" id="popup">
        <span class="close-btn" onclick="hidePopup()">&times;</span>
        <h3>Форма обратной связи</h3>
        <input type="text" id="name" placeholder="Ваше имя">
        <input type="email" id="email" placeholder="Email">
        <select id="city">
            <option>Москва</option>
            <option>Санкт-Петербург</option>
        </select>
        <button onclick="submitForm()">Отправить</button>
        <button onclick="hidePopup()">Отмена</button>
        <p id="result"></p>
    </div>

    <!-- Ссылка для возврата -->
    <a href="bet_page.html">← Вернуться на главную</a>
</body>
</html>
